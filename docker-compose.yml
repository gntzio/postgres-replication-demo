name: postgres-replica

services:
  primary:
    image: postgres:17
    container_name: pg_primary
    environment:
      POSTGRES_USER: replicator
      POSTGRES_PASSWORD: replicator_pass
      POSTGRES_DB: demo
    ports:
      - "5444:5432"
    volumes:
      - primary_data:/var/lib/postgresql/data
      - ./primary-setup.sh:/docker-entrypoint-initdb.d/setup-replication.sh
    networks:
      - pg_net

  replica:
    image: postgres:17
    container_name: pg_replica
    environment:
      POSTGRES_USER: replicator
      POSTGRES_PASSWORD: replicator_pass
      POSTGRES_DB: demo
    ports:
      - "5445:5432"
    volumes:
      - replica_data:/var/lib/postgresql/data
    depends_on:
      - primary
    networks:
      - pg_net

volumes:
  primary_data:
  replica_data:

networks:
  pg_net:
    driver: bridge
